# macOS 로그 로테이션 (감사 J2). logrotate가 아니라 newsyslog 사용.
# 설치:
#   sudo cp blog_publisher/ops/newsyslog-blog.conf /etc/newsyslog.d/blog.conf
#   sudo newsyslog -nv   # 동작 미리보기(드라이런)
# newsyslog는 기본적으로 매시 정각(launchd com.apple.newsyslog)에서 점검한다.
#
# 필드: logfilename  [owner:group]  mode  count  size(KB)  when  flags
#   count=보관 세대 수, size=이 KB 넘으면 회전, J=bzip2 압축
# logfilename          mode  count  size   when  flags
/tmp/blog-worker.log      644   7      5120   *     J
/tmp/blog-worker.err.log  644   7      5120   *     J
/tmp/blog-generate.log    644   7      5120   *     J
/tmp/blog-publish.log     644   7      5120   *     J
/tmp/blog-keepalive.log   644   7      2048   *     J
